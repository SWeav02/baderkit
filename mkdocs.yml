site_name: BaderKit Documentation
site_url: https://sweav02.github.io/baderkit/
repo_url: https://github.com/SWeav02/baderkit

theme:
  name: material
  language: en
  logo: images/logo_icon.svg
  favicon: images/logo.svg
  icon:
    repo: fontawesome/brands/github
  
  # Coloring for light/dark themes
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
      primary: deep purple
      accent: deep purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
      primary: deep purple
      accent: deep purple

  features:
      - navigation.tabs
      - navigation.tabs.sticky
      - content.code.annotate
      - content.code.copy

validation:
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: warn

# For emojis, annotations, etc. Stolen straight from [simmate](https://github.com/jacksund/simmate)
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.superfences:
        custom_fences:
              - name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Basic Usage: getting_started/usage.md
    - Plotting: getting_started/plotting.md
  - Theory and Methods:
    - Theory:
      - Bader: theory/bader/background.md
      - ELF: theory/elf_analysis/elf.md
      - QTAIM/ELF Overlap: theory/elf_analysis/basin_overlap.md
      - ELF Labeler: theory/elf_analysis/elf_labeler.md
      - ELF Radii: theory/elf_analysis/elf_radii.md
      - BadELF: theory/elf_analysis/badelf/background.md
      - Critical Points: theory/critical_points/usage.md
    - Methods:
      - Bader: theory/bader/methods.md
      - BadELF: theory/elf_analysis/badelf/methods.md
  - API Reference: 
    - Utilities:
      - Structure: api_reference/utilities/structure.md
      - Grid: api_reference/utilities/grid.md
    - Bader: 
      - Bader: api_reference/bader/bader.md
    - Elf Analysis:
      - BasinOverlap: api_reference/elf_analysis/basin_overlap.md
      - ElfLabeler: api_reference/elf_analysis/labeler.md
      - ElfRadii: api_reference/elf_analysis/elf_radii.md
      - Badelf: api_reference/elf_analysis/badelf.md
    - Plotting:
      - StructurePlotter: api_reference/plotting/structure.md
      - GridPlotter: api_reference/plotting/grid.md
      - BaderPlotter: api_reference/plotting/bader.md
      - BadelfPlotter: api_reference/plotting/badelf.md
      - ElfLabelerPlotter: api_reference/plotting/elf_labeler.md
  - Tutorials: 
    - tutorials/index.md
    - VASP:
      - 'Bader: Oxidation States': tutorials/vasp/bader.md
      - 'BadELF: Electride Charges': tutorials/vasp/badelf.md
      - 'BadELF: Spin Separated Charge': tutorials/vasp/badelf_spin.md
      - 'Elf Labeler: Bond Order': tutorials/vasp/bond_order.md
      - 'Basin Overlap: Polarization Index': tutorials/vasp/polarization_index.md
      - 'Elf Radii: Ionic Radii': tutorials/vasp/elf_radii.md
    - QE:
      - 'Bader: Oxidation States': tutorials/qe/bader.md
      - 'Elf Analysis': tutorials/qe/elf_analysis.md
    - Other:
      - 'Custom File Formats': tutorials/other/other_formats.md
      - 'Plotting' : tutorials/other/plotting.md
  - Citing: citing.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      watch:
      - src/baderkit
      handlers:
        python:
          options:
            inherited_members: true
            docstring_style: numpy
            docstring_section_style: table

extra_css:
  - css/mkdocstrings.css
  
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js